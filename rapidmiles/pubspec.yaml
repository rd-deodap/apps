name: rapidmiles
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.2+2

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Audio
  audioplayers: ^6.1.0

  # Your existing packages (pinned)
  get: ^4.6.6
  package_info_plus: ^8.0.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  http: ^1.2.2
  animations: ^2.0.11
  fl_chart: ^0.69.0
  ai_barcode_scanner:
  intl: ^0.19.0
  image_picker: ^1.1.2
  device_info_plus: ^10.1.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  flutter_launcher_icons: ^0.14.4
  mobile_scanner: ^5.2.3

  # Permissions / Location
  permission_handler: ^11.3.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # File / Camera / Web
  path_provider: ^2.1.4
  camera: ^0.11.0+2
  webview_flutter: ^4.10.0

  # Network / Utils
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/onboarding/
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
