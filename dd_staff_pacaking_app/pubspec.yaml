name: deodap
description: A new Flutter project.
version: 1.0.8+8

environment:
  sdk: ">=2.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI / Utils
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fluttertoast: ^8.2.8
  provider: ^6.1.2
  url_launcher: ^6.3.0
  flutter_svg: ^2.0.10+1
  flutter_html: ^3.0.0-beta.2
  overlay_support: ^2.1.0
  dropdown_button2: ^2.3.9
  equatable: ^2.0.5

  # Storage / DB
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  get_storage: ^2.1.1
  package_info_plus: ^8.0.2


  # Network
  http: ^1.2.2
  dio: ^5.7.0
  connectivity_plus: ^5.0.2

  # State management / Architecture
  get: ^4.6.6
  flutter_clean_architecture: ^6.0.1

  # Scanner / Camera
  mobile_scanner: ^5.2.3

  # Permissions / Files
  permission_handler: ^11.3.1
  file_utils: ^1.0.1
  geolocator:
  geocoding:
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # ✅ Slip viewers
  webview_flutter: ^4.10.0
  syncfusion_flutter_pdfviewer: ^32.1.22

  # OTP
  flutter_otp_text_field: ^1.1.3+2

  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1



flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.jpg"

flutter:
  uses-material-design: true

  fonts:
    - family: anekgujarati
      fonts:
        - asset: assets/fonts/anekgujarati_regular.ttf
          weight: 300
        - asset: assets/fonts/anekgujarati_medium.ttf
          weight: 400
        - asset: assets/fonts/anekgujarati_semibold.ttf
          weight: 500
        - asset: assets/fonts/anekgujarati_extrabold.ttf
          weight: 600

  assets:
    - assets/images/
