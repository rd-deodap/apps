name: deodap_staff_app
description: A mobile application for employee attendance, selfie punch, leave management, and work hour tracking for Deodap International Pvt. Ltd.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.20.2
  animations: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/design_course/
    - assets/fitness_app/
    - assets/hotel/
    - assets/introduction_animation/

  fonts:
    - family: WorkSans
      fonts:
        - asset: assets/fonts/WorkSans-Regular.ttf
        - asset: assets/fonts/WorkSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/WorkSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/WorkSans-Bold.ttf
          weight: 700

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

# -------------------------------------------------
# Flutter Launcher Icons configuration
# -------------------------------------------------
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"       # <-- Replace with your icon path
  adaptive_icon_background: "#ffffff"           # optional for Android adaptive icon
  adaptive_icon_foreground: "assets/images/app_icon.png"
